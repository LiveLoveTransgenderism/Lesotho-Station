- type: emote
  id: Blush
  name: chat-emote-name-blush
  chatMessages: ["chat-emote-msg-blush"]
  whitelist:
    components:
    - HumanoidProfile
  blacklist:
    tags:
    - SiliconEmotes
  chatTriggers:
    - blush
    - blush.
    - blush!
    - blushes
    - blushes.
    - blushes!
  event: !type:AnimationVisualEmoteEvent
    layer: Blush
    time: 5.2
    key: emoteAnimBlush

