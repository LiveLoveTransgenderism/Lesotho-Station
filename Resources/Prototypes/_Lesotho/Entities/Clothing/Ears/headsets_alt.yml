- type: entity
  parent: ClothingHeadsetAltSyndicate
  id: ClothingHeadsetAltSyndicateNuclear
  name: blood-red nuclear over-ear headset
  description: A special syndicate headset for nukeops.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyNuclear
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

