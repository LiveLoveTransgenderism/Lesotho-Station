- type: entity
  parent: EncryptionKey
  id: EncryptionKeyInterception
  name: interception encryption key
  description: A highly modified encryption key, now a decryption key that also includes standard broadband. Doesnt include ERT or Syndicate.
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Freelance
    - Handheld
    - CentCom
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_silver
    - state: synd_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyERT
  name: ert encryption key
  description: A top secret radio channel for ERT, includes standard broadband.
