- type: reagent
  id: WoundedSoldier
  parent: BaseDrink
  group: Unknown
  name: reagent-name-marshal
  desc: reagent-desc-marshal
  physicalDesc: reagent-physical-desc-marshal
  flavor: marshal
  color: "#5e718e"
  metabolisms:
    Digestion:
      conditions:
      - !type:WhitelistCondition
        checkMind: true
        whitelist:
          components:
          - Heretic
          - Ghoul
        guidebookText: entity-condition-guidebook-heretic-or-ghoul
      effects:
      - !type:ModifyStatusEffect
        conditions:
        - !type:HasStatusEffectCondition
          effectProto: StatusEffectWoundedSoldier
          inverted: true
        - !type:HasStatusEffectCondition
          effectProto: StatusEffectWoundedSoldierCooldown
          inverted: true
        - !type:ReagentCondition
          reagent: WoundedSoldier
          min: 5
        effectProto: StatusEffectWoundedSoldier
        time: 60
        type: Set
    Bloodstream:
      # Slash damage is split into all parts, which means vital damage is gonna be less, compensate high damage by high metabolism rate
      metabolismRate : 2.0
      conditions:
      - !type:WhitelistCondition
        checkMind: true
        inverted: true
        whitelist:
          components:
          - Heretic
          - Ghoul
        guidebookText: entity-condition-guidebook-not-heretic-or-ghoul
      effects:
      - !type:HealthChange
        splitDamage: Split
        damage:
          types:
            Slash: 32
          woundSeverityMultipliers:
            Slash: 5
          partDamageVariation: 2
      - !type:Emote
        emote: Scream
        probability: 0.8
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          inverted: true
          whitelist:
            components:
            - Heretic
            - Ghoul
          guidebookText: entity-condition-guidebook-not-heretic-or-ghoul
        splitDamage: Split
        ignoreResistances: false
        damage:
          types:
            Slash: 12
          woundSeverityMultipliers:
            Slash: 5
          partDamageVariation: 2
      - !type:Emote
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          inverted: true
          whitelist:
            components:
            - Heretic
            - Ghoul
          guidebookText: entity-condition-guidebook-not-heretic-or-ghoul
        emote: Scream
        probability: 0.8

