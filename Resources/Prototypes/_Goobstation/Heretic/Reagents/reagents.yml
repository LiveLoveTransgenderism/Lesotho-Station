- type: reagent
  id: EldritchEssence
  parent: BaseDrink
  group: Unknown
  name: reagent-name-eldritch
  desc: reagent-desc-eldritch
  physicalDesc: reagent-physical-desc-eldritch
  flavor: eldritch
  color: "#1f8016"
  metabolisms:
    Digestion:
      conditions:
      - !type:WhitelistCondition
        checkMind: true
        whitelist:
          components:
          - Heretic
          - Ghoul
        guidebookText: entity-condition-guidebook-heretic-or-ghoul
      effects:
      - !type:ModifyBloodLevel
        amount: 2
      - !type:EvenHealthChange
        damage:
          Burn: -3
          Toxin: -3
          Airloss: -3
          Brute: -3
          Genetic: -3
          Metaphysical: -5
      - !type:ModifyBleed
        amount: -1
      - !type:CleanBloodstream
        cleanseRate: 3
        excluded:
        - EldritchEssence
        - CrucibleSoul
        - DuskAndDawn
        - WoundedSoldier
        - NewbornEther
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        time: 50
        type: Remove
      - !type:TakeStaminaDamage
        amount: -10
        immediate: true
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        time: 50
        type: Remove
    Bloodstream:
      # Either predicted random is broken or some entity effect shitcode but setting probability of paralysis to below 1
      # results in it either not doing anything or paralyzing repeatedly over and over.
      # So we have this instead.
      metabolismRate: 5
      conditions:
      - !type:WhitelistCondition
        checkMind: true
        inverted: true
        whitelist:
          components:
          - Heretic
          - Ghoul
        guidebookText: entity-condition-guidebook-not-heretic-or-ghoul
      effects:
      - !type:ModifyParalysis
        time: 1
      - !type:HealthChange
        damage:
          types:
            Poison: 15
  tileReactions:
  - !type:ChangeTileReaction # Rusts tile

