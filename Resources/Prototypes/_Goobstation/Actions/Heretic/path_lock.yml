- type: entity
  parent: BaseAction
  id: ActionHereticLastRefuge
  name: Caretaker’s Last Refuge
  description: Shifts you into the Caretaker's Refuge, rendering you translucent and intangible. While in the Refuge your movement is unrestricted, but you cannot use your hands or cast any spells. You cannot enter the Refuge while near other sentient beings, and you can be removed from it upon contact with antimagical artifacts.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 6
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: last_refuge
  - type: InstantAction
    event: !type:EventHereticCloak
      status: LastRefugeStatusEffect
  - type: HereticAction
    requireMagicItem: true
  - type: LastRefugeAction

- type: entity
  parent: BaseAction
  id: ActionHereticShapeshiftLock
  name: Shapechange
  description: A spell that allows you to take on the form of another creature, gaining their abilities.
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: shapeshift
  - type: InstantAction
    event: !type:EventHereticShapeshift
  - type: ShapeshiftAction
    polymorphs:
    - ShapeshiftStalkerLock
    - ShapeshiftProphetLock
    - ShapeshiftMaidLock
    - ShapeshiftFireSharkLock
    - ShapeshiftRustWalkerLock
    - ShapeshiftShatteredLock
  - type: UserInterface
    interfaces:
      enum.HereticShapeshiftUiKey.Key:
        type: HereticShapeshiftBoundUserInterface
        requireInputValidation: false
        interactionRange: -1
  - type: HereticAction
